# Nginx vhost for the Glitch Grow Ads Agent.
# Terminates TLS (Let's Encrypt) and proxies to the local uvicorn on 3110.
# Install to /etc/nginx/sites-available/ then symlink + `certbot --nginx -d insights.glitchexecutor.com`.

server {
    listen 80;
    server_name insights.glitchexecutor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name insights.glitchexecutor.com;

    # certbot fills these in
    # ssl_certificate     /etc/letsencrypt/live/insights.glitchexecutor.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/insights.glitchexecutor.com/privkey.pem;

    # Shopify webhook bodies include verbatim JSON that must be forwarded unmodified
    # so HMAC verification succeeds.
    client_max_body_size 2m;

    location / {
        proxy_pass         http://127.0.0.1:3110;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
